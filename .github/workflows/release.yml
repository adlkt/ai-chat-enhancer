name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and update release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run compile

      - name: Build Chrome release ZIP
        run: npm run zip

      - name: Update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          TAG="v${VERSION}"
          TITLE="AI Chat Enhancer ${TAG}"
          ASSET=".output/${NAME}-${VERSION}-chrome.zip"

          if [ ! -f "${ASSET}" ]; then
            echo "Missing release asset: ${ASSET}" >&2
            find .output -maxdepth 2 -type f >&2
            exit 1
          fi

          cat > release-notes.md <<'NOTES'
          Chrome stable blocks direct drag-and-drop installation of locally packed CRX files with CRX_REQUIRED_PROOF_MISSING.

          For normal installation, download the Chrome ZIP asset below, unzip it, open chrome://extensions, enable Developer mode, and choose Load unpacked to select the unzipped folder.
          NOTES

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}" --force

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "${TITLE}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "${TAG}" \
              --title "${TITLE}" \
              --notes-file release-notes.md \
              --latest
          fi

          gh release upload "${TAG}" "${ASSET}" --clobber
